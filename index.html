<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedMOBiptv - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #121212; --txt: #ffffff; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--red); font-size: 24px; font-weight: bold; }
        header span { color: var(--red); }
        .container { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 5px; margin-bottom: 10px; outline: none; width: 100%; box-sizing: border-box; }
        button { background: var(--red); color: #fff; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 10px; width: 100%; }
        #video-container { width: 100%; background: #000; aspect-ratio: 16/9; position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        video { width: 100%; height: 100%; }
        .chan-item { background: var(--card); display: flex; align-items: center; padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; border: 1px solid #222; }
        .chan-item img { width: 45px; height: 45px; margin-right: 15px; object-fit: contain; background: #000; border-radius: 3px; }
        .hidden { display: none; }
        #status { color: var(--red); text-align: center; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="video-container" class="hidden">
    <video id="video" controls playsinline></video>
</div>

<header>RedMOB<span>iptv</span></header>

<div class="container">
    <div id="setup-screen">
        <input type="text" id="m3uUrl" placeholder="Cole sua lista M3U8 aqui...">
        <div id="status">Certifique-se que o Allow-CORS está ON</div>
        <button onclick="loadIPTV()">CARREGAR LISTA DIRETA</button>
    </div>

    <div id="player-screen" class="hidden">
        <input type="text" id="search" placeholder="🔍 Buscar canal..." onkeyup="filter()">
        <div id="channelList"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    let allChannels = [];

    async function loadIPTV() {
        const url = document.getElementById('m3uUrl').value;
        if(!url) return alert("Insira o link da lista!");
        
        document.getElementById('status').innerText = "Carregando diretamente via Extensão...";

        try {
            // BUSCA DIRETA (A Extensão Allow-CORS cuidará do resto)
            const response = await fetch(url);
            const data = await response.text();
            
            if(!data.includes("#EXTM3U")) {
                throw new Error("Não é uma lista válida");
            }
            
            parseM3U(data);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('video-container').classList.remove('hidden');
            document.getElementById('player-screen').classList.remove('hidden');
        } catch (err) {
            document.getElementById('status').innerText = "ERRO: A extensão está desligada ou o link é inválido.";
            console.error(err);
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let current = null;
        allChannels = [];

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                const name = line.split(',').pop();
                const logoMatch = line.match(/tvg-logo="(.*?)"/);
                current = { name, logo: logoMatch ? logoMatch[1] : '' };
            } else if (line.startsWith('http')) {
                if (current) {
                    current.url = line;
                    allChannels.push(current);
                    current = null;
                }
            }
        }
        render(allChannels);
    }

    function render(list) {
        const container = document.getElementById('channelList');
        container.innerHTML = "";
        list.forEach(c => {
            const d = document.createElement('div');
            d.className = 'chan-item';
            d.onclick = () => playStream(c.url);
            d.innerHTML = `<img src="${c.logo || 'https://via.placeholder.com/45/000/fff?text=TV'}"> <span>${c.name}</span>`;
            container.appendChild(d);
        });
    }

    function playStream(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
        window.scrollTo(0,0);
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        render(allChannels.filter(c => c.name.toLowerCase().includes(q)));
    }
</script>
</body>
</html>
