<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedMOBiptv - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #ff0000; --bg: #0a0a0a; --card: #161616; --txt: #ffffff; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid var(--red); font-weight: bold; font-size: 22px; }
        header span { color: var(--red); }
        .setup { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; }
        button { background: var(--red); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #video-container { width: 100%; background: #000; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }
        .list { flex: 1; overflow-y: auto; padding: 10px; }
        .item { background: var(--card); display: flex; align-items: center; padding: 10px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
        .item img { width: 40px; height: 40px; margin-right: 15px; object-fit: contain; }
        .hidden { display: none; }
        .loading { text-align: center; color: var(--red); padding: 20px; }
    </style>
</head>
<body>

<header>RedMOB<span>iptv</span></header>

<div id="login-screen" class="setup">
    <input type="text" id="m3uUrl" placeholder="Cole aqui seu link M3U8...">
    <button onclick="fetchList()">CARREGAR CANAIS</button>
    <p style="font-size: 10px; color: #666; text-align: center;">Nota: Usamos uma ponte CORS para liberar sua lista.</p>
</div>

<div id="player-screen" class="hidden">
    <div id="video-container">
        <video id="video" controls playsinline></video>
    </div>
    <div style="padding: 10px;">
        <input type="text" id="search" placeholder="🔍 Buscar canal..." onkeyup="filter()" style="width:100%; padding: 10px; box-sizing: border-box;">
    </div>
    <div class="list" id="channelList"></div>
</div>

<script>
    const video = document.getElementById('video');
    let allChannels = [];

    async function fetchList() {
        const rawUrl = document.getElementById('m3uUrl').value;
        if(!rawUrl) return alert("Insira a URL!");

        // ESTA É A SOLUÇÃO PARA O CORS:
        // Usamos o proxy corsproxy.io para "enganar" o bloqueio do servidor
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(rawUrl);

        document.getElementById('login-screen').innerHTML = '<div class="loading">Iniciando Ponte Segura... aguarde.</div>';

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Erro na rede');
            const data = await response.text();
            parse(data);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('player-screen').classList.remove('hidden');
        } catch (err) {
            alert("Erro de CORS ou Link Inválido. Tente novamente.");
            location.reload();
        }
    }

    function parse(data) {
        const lines = data.split('\n');
        let current = null;
        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const name = line.split(',').pop();
                const logo = line.match(/tvg-logo="(.*?)"/);
                current = { name, logo: logo ? logo[1] : '' };
            } else if (line.startsWith('http') && current) {
                current.url = line;
                allChannels.push(current);
                current = null;
            }
        });
        render(allChannels);
    }

    function render(list) {
        const container = document.getElementById('channelList');
        container.innerHTML = "";
        list.forEach(c => {
            const d = document.createElement('div');
            d.className = 'item';
            d.onclick = () => play(c.url);
            d.innerHTML = `<img src="${c.logo || 'https://via.placeholder.com/40'}"> <span>${c.name}</span>`;
            container.appendChild(d);
        });
    }

    function play(url) {
        // Para o vídeo também passar pelo proxy se necessário
        const finalUrl = "https://corsproxy.io/?" + encodeURIComponent(url);
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = finalUrl;
            video.play();
        }
        window.scrollTo(0,0);
    }

    function filter() {
        const query = document.getElementById('search').value.toLowerCase();
        render(allChannels.filter(c => c.name.toLowerCase().includes(query)));
    }
</script>
</body>
</html>
